<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UX / UI Audit Tool</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #ffffff;
      --bg2: #f5f5f3;
      --bg3: #efefec;
      --text: #1a1a18;
      --text2: #5a5a56;
      --text3: #9a9a94;
      --border: rgba(0,0,0,0.10);
      --border2: rgba(0,0,0,0.18);
      --radius: 10px;
      --radius-sm: 6px;
      --font: -apple-system, 'Segoe UI', sans-serif;
      --green: #1D9E75;
      --amber: #BA7517;
      --red: #D85A30;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1c1c1a;
        --bg2: #242422;
        --bg3: #2c2c2a;
        --text: #f0f0ec;
        --text2: #a0a09a;
        --text3: #606058;
        --border: rgba(255,255,255,0.10);
        --border2: rgba(255,255,255,0.18);
      }
    }

    body {
      font-family: var(--font);
      background: var(--bg3);
      color: var(--text);
      min-height: 100vh;
      padding: 2rem 1rem 4rem;
    }

    .wrap {
      max-width: 820px;
      margin: 0 auto;
    }

    header {
      margin-bottom: 2rem;
    }

    header h1 {
      font-size: 26px;
      font-weight: 600;
      letter-spacing: -0.02em;
      margin-bottom: 6px;
    }

    header p {
      font-size: 15px;
      color: var(--text2);
    }

    .badge {
      display: inline-block;
      font-size: 11px;
      font-weight: 500;
      padding: 3px 10px;
      border-radius: 20px;
      margin-bottom: 12px;
      background: #E1F5EE;
      color: #0F6E56;
    }

    .card {
      background: var(--bg);
      border: 0.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
      margin-bottom: 1.25rem;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 1rem;
    }

    input[type="url"], input[type="password"], input[type="text"] {
      height: 40px;
      padding: 0 14px;
      font-size: 14px;
      border: 0.5px solid var(--border2);
      border-radius: var(--radius-sm);
      background: var(--bg);
      color: var(--text);
      outline: none;
      font-family: var(--font);
      width: 100%;
    }

    input:focus {
      border-color: #1D9E75;
      box-shadow: 0 0 0 3px rgba(29,158,117,0.12);
    }

    .input-row input { flex: 1; }

    .key-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 1rem;
    }

    .key-group label {
      display: block;
      font-size: 12px;
      color: var(--text2);
      margin-bottom: 5px;
    }

    .btn-run {
      height: 40px;
      padding: 0 22px;
      background: var(--text);
      color: var(--bg);
      border: none;
      border-radius: var(--radius-sm);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
      font-family: var(--font);
      transition: opacity 0.15s;
    }

    .btn-run:hover { opacity: 0.82; }
    .btn-run:disabled { opacity: 0.35; cursor: not-allowed; }

    .info-note {
      font-size: 12px;
      color: var(--text3);
      line-height: 1.6;
    }

    .error-msg {
      margin-top: 10px;
      font-size: 13px;
      color: var(--red);
    }

    /* Progress */
    .progress-section { display: none; margin-top: 1.25rem; }
    .step-list { display: flex; flex-direction: column; gap: 8px; }
    .step {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
      color: var(--text3);
    }
    .step.done { color: var(--green); }
    .step.active { color: var(--text); }
    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--border2);
      flex-shrink: 0;
    }
    .step.done .dot { background: var(--green); }
    .step.active .dot { background: var(--text); animation: pulse 1s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.25} }

    /* Results */
    .results { display: none; }

    .tabs {
      display: flex;
      border: 0.5px solid var(--border);
      border-radius: var(--radius-sm);
      overflow: hidden;
      margin-bottom: 1.25rem;
      background: var(--bg2);
    }
    .tab {
      flex: 1;
      padding: 9px 12px;
      font-size: 13px;
      font-weight: 500;
      text-align: center;
      cursor: pointer;
      background: none;
      color: var(--text2);
      border: none;
      border-right: 0.5px solid var(--border);
      font-family: var(--font);
      transition: background 0.1s;
    }
    .tab:last-child { border-right: none; }
    .tab.active { background: var(--bg); color: var(--text); }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* Overview */
    .overall-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 1.25rem;
    }
    .overall-card {
      background: var(--bg2);
      border-radius: var(--radius-sm);
      padding: 16px;
      text-align: center;
    }
    .oc-label { font-size: 12px; color: var(--text2); margin-bottom: 6px; }
    .oc-score { font-size: 32px; font-weight: 600; letter-spacing: -0.03em; }
    .oc-score span { font-size: 16px; font-weight: 400; color: var(--text2); }
    .oc-model { font-size: 11px; color: var(--text3); margin-top: 3px; }

    .scores-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 8px;
      margin-bottom: 0;
    }

    @media (max-width: 600px) {
      .scores-grid { grid-template-columns: repeat(4, 1fr); }
      .key-row { grid-template-columns: 1fr; }
    }

    .score-card {
      background: var(--bg2);
      border-radius: var(--radius-sm);
      padding: 12px 8px;
      text-align: center;
    }
    .dim-label {
      font-size: 10px;
      color: var(--text2);
      margin-bottom: 8px;
      line-height: 1.3;
      min-height: 26px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .score-num { font-size: 20px; font-weight: 600; }
    .score-bar {
      height: 3px;
      border-radius: 2px;
      margin-top: 8px;
      background: var(--border);
    }
    .score-fill { height: 100%; border-radius: 2px; }

    /* Findings */
    .findings-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    @media (max-width: 540px) { .findings-grid { grid-template-columns: 1fr; } }

    .finding-card {
      background: var(--bg);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 14px;
    }
    .fc-dim {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text3);
      margin-bottom: 5px;
    }
    .fc-title {
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 5px;
      color: var(--text);
    }
    .fc-text {
      font-size: 12px;
      color: var(--text2);
      line-height: 1.55;
    }

    /* Actions */
    .priority-list { display: flex; flex-direction: column; gap: 8px; }
    .action-item {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      background: var(--bg);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 14px;
    }
    .priority-badge {
      font-size: 10px;
      font-weight: 600;
      padding: 3px 9px;
      border-radius: 20px;
      flex-shrink: 0;
      margin-top: 1px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .p-high { background: #FAECE7; color: #993C1D; }
    .p-medium { background: #FAEEDA; color: #854F0B; }
    .p-low { background: #EAF3DE; color: #3B6D11; }
    .ac-title { font-size: 13px; font-weight: 500; color: var(--text); margin-bottom: 4px; }
    .ac-desc { font-size: 12px; color: var(--text2); line-height: 1.55; }

    footer {
      text-align: center;
      margin-top: 2.5rem;
      font-size: 12px;
      color: var(--text3);
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="badge">Claude + GPT-4o</div>
      <h1>UX / UI Audit Tool</h1>
      <p>Paste a URL — get a scored audit across 7 dimensions from two AI models in ~3 minutes.</p>
    </header>

    <div class="card">
      <div class="input-row">
        <input type="url" id="urlInput" placeholder="https://example.com" />
        <button class="btn-run" id="runBtn" onclick="startAudit()">Run audit →</button>
      </div>

      <div class="key-row">
        <div class="key-group">
          <label for="anthropicKey">Anthropic API key <span style="color:var(--red)">*</span></label>
          <input type="password" id="anthropicKey" placeholder="sk-ant-..." />
        </div>
        <div class="key-group">
          <label for="openaiKey">OpenAI API key <span style="color:var(--text3)">(optional, for GPT-4o)</span></label>
          <input type="password" id="openaiKey" placeholder="sk-..." />
        </div>
      </div>

      <p class="info-note">
        🔒 Keys are used only in your browser — never stored or sent to any server other than the respective AI provider.
      </p>

      <div id="errorMsg" class="error-msg"></div>

      <div class="progress-section" id="progressSection">
        <div class="step-list" id="stepList"></div>
      </div>
    </div>

    <div class="results" id="results">
      <div class="tabs">
        <button class="tab active" onclick="switchTab('overview')">Overview</button>
        <button class="tab" onclick="switchTab('findings')">Detailed findings</button>
        <button class="tab" onclick="switchTab('actions')">Action plan</button>
      </div>

      <div class="tab-panel active" id="tab-overview">
        <div class="card" style="margin-bottom:1rem">
          <div class="overall-row" id="overallRow"></div>
          <div class="scores-grid" id="scoreOverview"></div>
        </div>
      </div>

      <div class="tab-panel" id="tab-findings">
        <div class="card">
          <div class="findings-grid" id="findingsGrid"></div>
        </div>
      </div>

      <div class="tab-panel" id="tab-actions">
        <div class="card">
          <div class="priority-list" id="priorityList"></div>
        </div>
      </div>
    </div>

    <footer>
      Built with Claude + GPT-4o &nbsp;·&nbsp; Keys stay in your browser
    </footer>
  </div>

  <script>
    const DIMENSIONS = [
      { id: 'navigation', label: 'Navigation' },
      { id: 'visual_hierarchy', label: 'Visual hierarchy' },
      { id: 'accessibility', label: 'Accessibility' },
      { id: 'conversion', label: 'Conversion' },
      { id: 'mobile_ux', label: 'Mobile UX' },
      { id: 'content_clarity', label: 'Content clarity' },
      { id: 'performance', label: 'Performance' }
    ];

    const STEPS = [
      'Fetching website content...',
      'Claude is analyzing the UX...',
      'GPT-4o is analyzing the UX...',
      'Consolidating scores...',
      'Generating action plan...'
    ];

    function setStep(i) {
      document.getElementById('stepList').innerHTML = STEPS.map((s, idx) => {
        let cls = 'step';
        if (idx < i) cls += ' done';
        else if (idx === i) cls += ' active';
        return `<div class="${cls}"><div class="dot"></div><span>${s}</span></div>`;
      }).join('');
    }

    function switchTab(name) {
      document.querySelectorAll('.tab').forEach((t, i) =>
        t.classList.toggle('active', ['overview', 'findings', 'actions'][i] === name));
      document.querySelectorAll('.tab-panel').forEach(p =>
        p.classList.toggle('active', p.id === 'tab-' + name));
    }

    function scoreColor(s) {
      if (s >= 8) return '#1D9E75';
      if (s >= 6) return '#BA7517';
      return '#D85A30';
    }

    function renderResults(data, hasGPT) {
      const claudeAvg = (data.claude_scores.reduce((a, b) => a + b, 0) / 7).toFixed(1);

      document.getElementById('overallRow').innerHTML = `
        <div class="overall-card">
          <div class="oc-label">Claude score</div>
          <div class="oc-score" style="color:${scoreColor(claudeAvg)}">${claudeAvg}<span>/10</span></div>
          <div class="oc-model">claude-sonnet-4-20250514</div>
        </div>
        ${hasGPT ? `<div class="overall-card">
          <div class="oc-label">GPT-4o score</div>
          <div class="oc-score" style="color:${scoreColor(data.gpt_avg)}">${data.gpt_avg}<span>/10</span></div>
          <div class="oc-model">gpt-4o</div>
        </div>` : ''}
        <div class="overall-card">
          <div class="oc-label">Combined score</div>
          <div class="oc-score" style="color:${scoreColor(data.combined_avg)}">${data.combined_avg}<span>/10</span></div>
          <div class="oc-model">${hasGPT ? 'Average of both models' : 'Claude only'}</div>
        </div>`;

      document.getElementById('scoreOverview').innerHTML = DIMENSIONS.map((d, i) => {
        const cs = data.claude_scores[i];
        const gs = hasGPT ? data.gpt_scores[i] : null;
        const avg = hasGPT ? ((cs + gs) / 2).toFixed(1) : cs.toFixed(1);
        return `<div class="score-card">
          <div class="dim-label">${d.label}</div>
          <div class="score-num" style="color:${scoreColor(avg)}">${avg}</div>
          <div class="score-bar"><div class="score-fill" style="width:${avg * 10}%;background:${scoreColor(avg)}"></div></div>
        </div>`;
      }).join('');

      document.getElementById('findingsGrid').innerHTML = data.findings.map(f => `
        <div class="finding-card">
          <div class="fc-dim">${f.dimension}</div>
          <div class="fc-title">${f.title}</div>
          <div class="fc-text">${f.description}</div>
        </div>`).join('');

      document.getElementById('priorityList').innerHTML = data.actions.map(a => {
        const p = (a.priority || 'Medium').toLowerCase();
        const cls = p === 'high' ? 'p-high' : p === 'low' ? 'p-low' : 'p-medium';
        return `<div class="action-item">
          <span class="priority-badge ${cls}">${a.priority}</span>
          <div>
            <div class="ac-title">${a.title}</div>
            <div class="ac-desc">${a.description}</div>
          </div>
        </div>`;
      }).join('');

      document.getElementById('results').style.display = 'block';
      document.getElementById('results').scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    async function callClaude(apiKey, system, user) {
      const r = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': apiKey,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true'
        },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 2000,
          system,
          messages: [{ role: 'user', content: user }]
        })
      });
      if (!r.ok) { const e = await r.json(); throw new Error(e.error?.message || 'Claude API error'); }
      return (await r.json()).content[0].text;
    }

    async function callGPT(apiKey, system, user) {
      const r = await fetch('https://api.openai.com/v1/chat/completions', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
        body: JSON.stringify({
          model: 'gpt-4o',
          max_tokens: 2000,
          messages: [{ role: 'system', content: system }, { role: 'user', content: user }]
        })
      });
      if (!r.ok) { const e = await r.json(); throw new Error(e.error?.message || 'OpenAI error'); }
      return (await r.json()).choices[0].message.content;
    }

    function buildSystem() {
      return `You are a senior UX/UI auditor. Respond ONLY with a valid JSON object — no markdown, no preamble.
Schema:
{
  "scores": [number,number,number,number,number,number,number],
  "findings": [{"dimension":"string","title":"string","description":"string"}],
  "actions": [{"priority":"High"|"Medium"|"Low","title":"string","description":"string"}]
}
The 7 scores map in order to: Navigation, Visual Hierarchy, Accessibility, Conversion Optimization, Mobile UX, Content Clarity, Performance. Each score is 1–10. Provide 7 findings (one per dimension) and 5–7 prioritized actions sorted High→Low.`;
    }

    function buildUser(url, content) {
      return `Audit this website for UX/UI quality.\nURL: ${url}\n\nWebsite content:\n${content.slice(0, 6000)}`;
    }

    async function fetchSite(url) {
      try {
        const r = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(url)}`, { signal: AbortSignal.timeout(15000) });
        const d = await r.json();
        if (d.contents) {
          const doc = new DOMParser().parseFromString(d.contents, 'text/html');
          doc.querySelectorAll('script,style,noscript,svg,nav,footer').forEach(el => el.remove());
          return (doc.body?.innerText || '').replace(/\s+/g, ' ').trim().slice(0, 6000);
        }
      } catch (e) {}
      return `[Could not fetch live content for ${url}. Analyze based on URL and common patterns for this type of site.]`;
    }

    async function startAudit() {
      const url = document.getElementById('urlInput').value.trim();
      const anthropicKey = document.getElementById('anthropicKey').value.trim();
      const openaiKey = document.getElementById('openaiKey').value.trim();
      const errEl = document.getElementById('errorMsg');
      errEl.textContent = '';

      if (!url || !url.startsWith('http')) { errEl.textContent = 'Please enter a valid URL starting with https://'; return; }
      if (!anthropicKey) { errEl.textContent = 'Please enter your Anthropic API key.'; return; }

      const btn = document.getElementById('runBtn');
      btn.disabled = true;
      document.getElementById('results').style.display = 'none';
      document.getElementById('progressSection').style.display = 'block';
      setStep(0);

      try {
        const content = await fetchSite(url);
        setStep(1);
        const sys = buildSystem();
        const usr = buildUser(url, content);

        const claudeRaw = await callClaude(anthropicKey, sys, usr);
        let claudeData;
        try { claudeData = JSON.parse(claudeRaw.replace(/```json|```/g, '').trim()); }
        catch (e) { throw new Error('Claude returned invalid JSON. Please try again.'); }

        let gptData = null;
        if (openaiKey) {
          setStep(2);
          try {
            const gptRaw = await callGPT(openaiKey, sys, usr);
            gptData = JSON.parse(gptRaw.replace(/```json|```/g, '').trim());
          } catch (e) { console.warn('GPT-4o failed:', e.message); }
        }

        setStep(3);
        const hasGPT = !!gptData;
        const combinedScores = DIMENSIONS.map((_, i) =>
          hasGPT ? (claudeData.scores[i] + (gptData.scores[i] || claudeData.scores[i])) / 2 : claudeData.scores[i]);
        const combined_avg = (combinedScores.reduce((a, b) => a + b, 0) / 7).toFixed(1);
        const gpt_avg = hasGPT ? ((gptData.scores || []).reduce((a, b) => a + b, 0) / 7).toFixed(1) : null;

        setStep(4);
        const merged = {
          claude_scores: claudeData.scores,
          gpt_scores: hasGPT ? gptData.scores : [],
          combined_avg, gpt_avg,
          findings: claudeData.findings,
          actions: claudeData.actions
        };

        setTimeout(() => {
          document.getElementById('progressSection').style.display = 'none';
          renderResults(merged, hasGPT);
        }, 500);
      } catch (e) {
        errEl.textContent = 'Error: ' + e.message;
        document.getElementById('progressSection').style.display = 'none';
      } finally {
        btn.disabled = false;
      }
    }

    document.getElementById('urlInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') startAudit();
    });
  </script>
</body>
</html>
